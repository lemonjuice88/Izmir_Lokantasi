<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">İzmir Lokantası - Menü</title>
    <meta name="format-detection" content="telephone=no">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="lang-switch">
        <button id="btn-tr" class="lang-btn active">TR</button>
        <button id="btn-en" class="lang-btn">EN</button>
        <button id="btn-ar" class="lang-btn">AR</button>
    </div>

    <!-- Ana Sayfaya Dön Butonu -->
    <a href="index.html" class="back-home-btn" id="back-home-btn">
        <ion-icon name="arrow-back-outline"></ion-icon> <span id="back-home-text">Ana Sayfa</span>
    </a>

    <header class="header">
        <div class="header-overlay"></div>
        <div class="header-content">
            <img src="logo.png" alt="İzmir Lokantası Logo" class="logo" onerror="this.style.display='none'; document.getElementById('hero-logo-fallback').style.display='flex';">
            <div class="logo-placeholder" id="hero-logo-fallback" style="display: none;">
                <ion-icon name="restaurant-outline"></ion-icon>
            </div>
        </div>
    </header>

    <nav class="category-nav" id="categoryNav">
    </nav>

    <main class="menu-container" id="menuContainer">
    </main>

    <footer class="footer">
        <p><span id="footer-text">İzmir Lokantası</span> &copy; 2026</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
